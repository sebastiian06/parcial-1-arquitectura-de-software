services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: iglesiadmin
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DB_URL: jdbc:postgresql://db:5432/iglesiadmin
      DB_USER: postgres
      DB_PASSWORD: postgres
      JWT_SECRET: super-secret-key-change-please-32bytes
    ports:
      - "8080:8080"
    depends_on:
      - db

  frontend:
    build:
      context: ./frontend
    ports:
      - "4200:80"
    depends_on:
      - backend

volumes:
  db_data:
